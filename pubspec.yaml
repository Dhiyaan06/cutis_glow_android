name: cutis_glow_android
description: "Aplikasi mobile Cutis Glow terintegrasi dengan Laravel API."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client + interceptor untuk Sanctum token
  dio: ^5.7.0

  # Penyimpanan token yang aman (Keychain/Keystore)
  flutter_secure_storage: ^9.2.2

  # Environment config (Base URL berbeda per platform)
  flutter_dotenv: ^5.2.1

  # Font Figtree -- disamain sama font yang dipakai web Laravel (Tailwind)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env.local
    - .env.production
    - assets/images/
    - assets/icons/
